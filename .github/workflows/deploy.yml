name: Deploy to Frigate

on:
  push:
    branches:
      - production

jobs:
  scan-secrets:
    name: Scan for secrets
    runs-on: self-hosted
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        run: |
          gitleaks detect \
            --config .gitleaks.toml \
            --redact \
            --exit-code 1

  deploy:
    name: Build and deploy whosatmyfeeder
    runs-on: self-hosted
    needs: scan-secrets
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push image
        run: |
          docker build \
            -t ghcr.io/k1n6b0b/whosatmyfeeder:${{ github.sha }} \
            -t ghcr.io/k1n6b0b/whosatmyfeeder:latest \
            .
          docker push ghcr.io/k1n6b0b/whosatmyfeeder:${{ github.sha }}
          docker push ghcr.io/k1n6b0b/whosatmyfeeder:latest

      - name: Deploy
        run: |
          docker compose -f DEPLOY_DIR/docker-compose.yml pull
          docker compose -f DEPLOY_DIR/docker-compose.yml up -d
