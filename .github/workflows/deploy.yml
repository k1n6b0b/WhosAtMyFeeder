name: Deploy to Frigate

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  scan-secrets:
    name: Scan for secrets
    runs-on: self-hosted
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Run gitleaks
        run: |
          gitleaks detect \
            --config .gitleaks.toml \
            --redact \
            --exit-code 1

  deploy:
    name: Build and deploy whosatmyfeeder
    runs-on: self-hosted
    needs: scan-secrets
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull previous image for layer cache
        run: docker pull ghcr.io/k1n6b0b/whosatmyfeeder:latest || true

      - name: Build image
        run: |
          docker build \
            --cache-from ghcr.io/k1n6b0b/whosatmyfeeder:latest \
            -t ghcr.io/k1n6b0b/whosatmyfeeder:${{ github.sha }} \
            .

      - name: Scan image for critical vulnerabilities
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --ignore-unfixed \
            --no-progress \
            ghcr.io/k1n6b0b/whosatmyfeeder:${{ github.sha }}

      - name: Push image
        run: |
          docker tag ghcr.io/k1n6b0b/whosatmyfeeder:${{ github.sha }} ghcr.io/k1n6b0b/whosatmyfeeder:latest
          docker push ghcr.io/k1n6b0b/whosatmyfeeder:${{ github.sha }}
          docker push ghcr.io/k1n6b0b/whosatmyfeeder:latest

      - name: Deploy
        run: |
          current=$(grep 'image:' DEPLOY_DIR/docker-compose.yml | awk '{print $2}')
          echo "$current" > DEPLOY_DIR/.last-deployed
          sed -i "s|image: ghcr.io/k1n6b0b/whosatmyfeeder:.*|image: ghcr.io/k1n6b0b/whosatmyfeeder:${{ github.sha }}|" DEPLOY_DIR/docker-compose.yml
          docker compose -f DEPLOY_DIR/docker-compose.yml pull
          docker compose -f DEPLOY_DIR/docker-compose.yml up -d

      - name: Health check
        run: |
          sleep 5
          curl -sSf --max-time 10 http://localhost:7766 > /dev/null && echo "Health check passed" \
            || (echo "Health check FAILED" && exit 1)

      - name: Clean up old images
        run: docker image prune -f
