<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Who's At My Feeder?{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/flutter.svg') }}">
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        if (params.get('embed') === 'ha') {
          document.documentElement.classList.add('ha-embed');
        }
      })();
    </script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block head_extra %}{% endblock %}
</head>
<body class="wamf-body">
<nav class="navbar navbar-expand-lg wamf-navbar">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Who's At My Feeder?</a>
        {% if title_text %}
        <span class="navbar-text">
            {% if title_link %}
                <a class="navbar-title" href="{{ title_link }}">{{ title_text }}</a>
            {% else %}
                <span class="navbar-title">{{ title_text }}</span>
            {% endif %}
        </span>
        {% endif %}
        {% block date_picker %}{% endblock %}
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0"></ul>
        </div>
    </div>
</nav>

<div class="container-fluid wamf-container">
    {% block content %}{% endblock %}
</div>

<script>
  (function () {
    const params = new URLSearchParams(window.location.search);
    if (params.get('embed') !== 'ha') {
      return;
    }

    const withEmbed = (href) => {
      try {
        const parsed = new URL(href, window.location.origin);
        if (parsed.origin !== window.location.origin) {
          return href;
        }
        parsed.searchParams.set('embed', 'ha');
        return parsed.pathname + parsed.search + parsed.hash;
      } catch (_err) {
        return href;
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      document.body.classList.add('ha-embed');
      document.querySelectorAll('a[href]').forEach((anchor) => {
        const href = anchor.getAttribute('href');
        if (!href || href.startsWith('javascript:') || href.startsWith('#')) {
          return;
        }
        anchor.setAttribute('href', withEmbed(href));
      });
    });
  })();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
